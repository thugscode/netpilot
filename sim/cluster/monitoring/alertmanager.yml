global:
  resolve_timeout: 5m

route:
  receiver: 'default'
  group_by: ['alertname', 'service', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  routes:
    - receiver: webhook
      match:
        severity: critical
      continue: true
    - receiver: webhook
      match:
        component: cascade
      continue: true

receivers:
  - name: 'default'
    webhook_configs: []

  - name: 'webhook'
    webhook_configs:
      - url: 'http://alert-receiver:5000/webhook'
        send_resolved: true

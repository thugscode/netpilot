apiVersion: v1
kind: Service
metadata:
  name: alert-receiver
  namespace: default
  labels:
    app: alert-receiver
spec:
  ports:
    - port: 5000
      targetPort: 5000
      name: web
  selector:
    app: alert-receiver
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-receiver
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alert-receiver
  template:
    metadata:
      labels:
        app: alert-receiver
    spec:
      containers:
      - name: alert-receiver
        image: netpilot-alert-receiver:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
          name: web
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 3
          periodSeconds: 5
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            cpu: 200m
            memory: 512Mi
        volumeMounts:
        - name: alerts-log
          mountPath: /tmp
      volumes:
      - name: alerts-log
        emptyDir: {}

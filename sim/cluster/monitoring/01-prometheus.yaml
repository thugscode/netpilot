apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
  - apiGroups:
      - extensions
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: default

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: default
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: netpilot
        environment: simulation

    rule_files:
      - /etc/prometheus/rules/*.yml

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093

    scrape_configs:
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __scheme__
            regex: ([^;]+);.*
            replacement: http
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: ([^;]+);(.+)
            replacement: $2:$1
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: app

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: default
data:
  alert-rules.yml: |
    groups:
      - name: netpilot_alerts
        interval: 30s
        rules:
          - alert: HighPodRestartRate
            expr: |
              increase(kube_pod_container_status_restarts_total[5m]) > 2
            for: 1m
            labels:
              severity: critical
              component: pod
            annotations:
              summary: "High pod restart rate detected"
              description: "Pod {{ $labels.pod }} restarted {{ $value }} times in 5 minutes"

          - alert: HighErrorRate
            expr: |
              (sum(rate(service_requests_total{status=~"5.."}[5m])) by (service) / sum(rate(service_requests_total[5m])) by (service)) > 0.05
            for: 2m
            labels:
              severity: warning
              component: http
            annotations:
              summary: "High HTTP error rate detected"
              description: "Service {{ $labels.service }} error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

          - alert: HighLatency
            expr: |
              histogram_quantile(0.99, sum(rate(service_request_duration_seconds_bucket[5m])) by (service, le)) > 0.5
            for: 2m
            labels:
              severity: warning
              component: latency
            annotations:
              summary: "High P99 latency detected"
              description: "Service {{ $labels.service }} P99 latency is {{ $value | humanizeDuration }}"

          - alert: ServiceDown
            expr: |
              up{job="kubernetes-pods"} == 0
            for: 2m
            labels:
              severity: critical
              component: service
            annotations:
              summary: "Service is down"
              description: "Service {{ $labels.app }} is not responding"

          - alert: HighDownstreamFailureRate
            expr: |
              (sum(rate(service_downstream_calls_total{status="error"}[5m])) by (service, downstream) / sum(rate(service_downstream_calls_total[5m])) by (service, downstream)) > 0.1
            for: 1m
            labels:
              severity: warning
              component: downstream
            annotations:
              summary: "High downstream call failure rate"
              description: "Service {{ $labels.service }} → {{ $labels.downstream }}: {{ $value | humanizePercentage }} errors"

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: default
  labels:
    app: prometheus
spec:
  ports:
    - port: 9090
      targetPort: 9090
      name: web
  selector:
    app: prometheus
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
      - name: prometheus
        image: prom/prometheus:v2.40.0
        args:
          - "--config.file=/etc/prometheus/prometheus.yml"
          - "--storage.tsdb.path=/prometheus"
          - "--storage.tsdb.retention.time=24h"
          - "--web.console.libraries=/usr/share/prometheus/console_libraries"
          - "--web.console.templates=/usr/share/prometheus/consoles"
        ports:
        - containerPort: 9090
          name: web
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: rules
          mountPath: /etc/prometheus/rules
        - name: storage
          mountPath: /prometheus
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: rules
        configMap:
          name: prometheus-rules
      - name: storage
        emptyDir: {}
